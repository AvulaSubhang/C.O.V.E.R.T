version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: covert-postgres
    environment:
      POSTGRES_USER: covert_user
      POSTGRES_PASSWORD: covert_password
      POSTGRES_DB: covert_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covert_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - covert-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: covert-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - covert-network

  # IPFS Node
  ipfs:
    image: ipfs/kubo:latest
    container_name: covert-ipfs
    ports:
      - "4001:4001"     # P2P
      - "5001:5001"     # API
      - "8080:8080"     # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD-SHELL", "ipfs id"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - covert-network

  # Local Blockchain (Anvil)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: covert-anvil
    command: anvil --host 0.0.0.0 --block-time 2
    ports:
      - "8545:8545"
    networks:
      - covert-network

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: covert-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://covert_user:covert_password@postgres:5432/covert_db
      - REDIS_URL=redis://redis:6379/0
      - IPFS_API_URL=https://api.pinata.cloud/pinning/pinFileToIPFS
      - IPFS_GATEWAY_URL=https://gateway.pinata.cloud
      - PINATA_API_KEY=9fcc6f3c8188c2e741b3
      - PINATA_SECRET_KEY=03984567a6849a7e820618c612a7e77607023c936896cb572732834f5a66f968
      - RPC_URL=https://sepolia.base.org
      - CHAIN_ID=84532
    depends_on:
      - postgres
      - redis
      - ipfs
      - anvil
    networks:
      - covert-network

volumes:
  postgres_data:
  redis_data:
  ipfs_data:

networks:
  covert-network:
    driver: bridge
