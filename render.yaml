databases:
  - name: covert-postgres
    databaseName: covert_db
    user: covert_user

services:
  - type: redis
    name: covert-redis
    ipAllowList: []

  - type: web
    name: covert-backend
    env: docker
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: covert-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: covert-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "https://frontend-xi-ecru-10.vercel.app,http://localhost:5173,http://localhost:3000"
      - key: SECRET_KEY
        generateValue: true
      - key: IPFS_API_URL
        value: "/dns4/ipfs.infura.io/tcp/5001/https"
      - key: IPFS_GATEWAY_URL
        value: "https://ipfs.io"
      - key: RPC_URL
        value: "https://sepolia.base.org"
      - key: CHAIN_ID
        value: "84532"
